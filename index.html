<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning-Starr Pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BASES & VARIABLES --- */
        :root {
            --bg: #050505;
            --card-bg: #0d0d0d;
            --accent: #00f2ff; /* Cyan Néon */
            --gold: #ffcc00;   /* Or VVS */
            --text: #ffffff;
            --font-main: 'Space Grotesk', sans-serif;
            --font-logo: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- EFFETS DE FOND --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- HEADER & LOGO --- */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            position: relative;
            animation: fadeIn 2s ease-out;
        }

        .main-title {
            font-family: var(--font-logo);
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--text), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--accent);
            margin-top: 10px;
            opacity: 0.8;
        }

        /* --- GRILLE DE CONTENU --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px;
            position: relative;
            z-index: 2;
        }

        .section-label {
            font-family: var(--font-logo);
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: block;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        /* --- CARTES PRO --- */
        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 4px;
            border-left: 2px solid var(--accent);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #141414;
            border-left: 2px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 50px; height: 50px;
            background: linear-gradient(135deg, transparent 50%, rgba(255, 204, 0, 0.1) 50%);
        }

        .quote {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .author {
            font-family: var(--font-logo);
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <div class="logo-container">
            <h1 class="main-title">Morning-Starr</h1>
            <p class="sub-title">SYSTÈME PRO PHILOSOPHIQUE</p>
        </div>
        <div style="margin-top: 50px;">
            <svg width="30" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </header>

    <div class="container">
        <span class="section-label">// Noyau de Pensée</span>
        <div class="grid" id="philosophy-grid">
            </div>

        <span class="section-label">// Sagesses du Monde</span>
        <div class="grid" id="proverbs-grid">
            </div>
    </div>

    <footer>
        DESIGNED FOR MORNING-STARR MORGAN &copy; 2026
    </footer>

    <script>
        // DONNÉES DU SYSTÈME
        const philosophy = [
            { text: "La connaissance s'acquiert par l'expérience, tout le reste n'est que de l'information.", author: "Albert Einstein" },
            { text: "Le plus grand voyageur n'est pas celui qui a fait dix fois le tour du monde, mais celui qui a fait une seule fois le tour de lui-même.", author: "Gandhi" },
            { text: "L'excellence n'est pas une action, c'est une habitude.", author: "Aristote" },
            { text: "Agis comme s'il était impossible d'échouer.", author: "Winston Churchill" }
        ];

        const proverbs = [
            { text: "Si tu veux aller vite, marche seul. Si tu veux aller loin, marchons ensemble.", author: "Proverbe Africain" },
            { text: "Le meilleur moment pour planter un arbre était il y a 20 ans. Le deuxième meilleur moment est maintenant.", author: "Proverbe Chinois" },
            { text: "Tomber sept fois, se relever huit.", author: "Proverbe Japonais" },
            { text: "La parole est d'argent, mais le silence est d'or.", author: "Proverbe Anonyme" }
        ];

        // MOTEUR D'INJECTION
        function loadContent(data, elementId) {
            const grid = document.getElementById(elementId);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card reveal';
                card.innerHTML = `
                    <p class="quote">"${item.text}"</p>
                    <p class="author">― ${item.author}</p>
                `;
                grid.appendChild(card);
            });
        }

        // INITIALISATION
        window.addEventListener('DOMContentLoaded', () => {
            loadContent(philosophy, 'philosophy-grid');
            loadContent(proverbs, 'proverbs-grid');
            
            // Trigger animation au scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
