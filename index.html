<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morning Starr Morgan</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2300fff7'/%3E%3Cstop offset='100%25' style='stop-color:%23ffd700'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0f'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='900' text-anchor='middle' fill='url(%23g)'%3EM%3C/text%3E%3Ccircle cx='85' cy='15' r='8' fill='%23ff2a6d'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --clr-bg:#08080c;
  --clr-bg-card:#0f111a;
  --clr-accent:#00fff7;
  --clr-gold:#ffd700;
  --clr-rose:#ff2a6d;
  --clr-text:#e0e0e0;
  --radius:16px;
  --duration:.4s;
  --font-display:'Orbitron',sans-serif;
  --font-body:'Space Grotesk',sans-serif;
  --font-quote:'Playfair Display',serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:var(--font-body);
  background:var(--clr-bg);
  color:var(--clr-text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}

.bg-gradient{
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(0,255,247,0.08) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(255,42,109,0.05) 0%,transparent 50%);
  z-index:-2;
  animation:pulseBg 8s ease-in-out infinite alternate;
}

@keyframes pulseBg{
  from{opacity:0.5;transform:scale(1)}
  to{opacity:1;transform:scale(1.1)}
}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:var(--clr-accent);
  border-radius:50%;
  opacity:0.3;
  animation:float 20s infinite linear;
}

@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:0.5}
  90%{opacity:0.5}
  100%{transform:translateY(-100vh) translateX(100px);opacity:0}
}

#introScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:3rem;
  z-index:9999;
  background:linear-gradient(135deg,var(--clr-bg) 0%,#0f172a 100%);
  padding:2rem;
  transition:opacity 0.5s ease;
}

.logo-big{
  width:120px;
  height:120px;
  background:linear-gradient(135deg,var(--clr-accent),var(--clr-gold));
  border-radius:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:70px;
  font-weight:900;
  color:var(--clr-bg);
  box-shadow:0 20px 60px rgba(0,255,247,0.4),0 0 100px rgba(255,215,0,0.2);
  animation:floatLogo 3s ease-in-out infinite;
  position:relative;
}

.logo-big::after{
  content:'';
  position:absolute;
  inset:-5px;
  border-radius:35px;
  background:linear-gradient(135deg,var(--clr-accent),var(--clr-rose));
  z-index:-1;
  opacity:0.5;
  filter:blur(20px);
}

@keyframes floatLogo{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

#animatedTitle{
  font-family:var(--font-display);
  font-size:clamp(2rem,6vw,4rem);
  background:linear-gradient(90deg,var(--clr-accent),var(--clr-gold),var(--clr-accent));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
  letter-spacing:4px;
  text-transform:uppercase;
}

@keyframes shimmer{
  to{background-position:200% center}
}

.language-selector{
  display:flex;
  flex-direction:column;
  gap:1rem;
  align-items:center;
}

#languageSelect{
  padding:1rem 2.5rem;
  font-size:1.1rem;
  border:2px solid rgba(0,255,247,0.3);
  border-radius:50px;
  background:rgba(0,255,247,0.05);
  color:var(--clr-accent);
  font-family:var(--font-body);
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all var(--duration);
  min-width:250px;
}

#languageSelect:hover,
#languageSelect:focus{
  border-color:var(--clr-accent);
  box-shadow:0 0 30px rgba(0,255,247,0.3);
  outline:none;
}

#enterButton{
  padding:1.2rem 4rem;
  font-size:1.2rem;
  font-weight:700;
  font-family:var(--font-display);
  text-transform:uppercase;
  letter-spacing:3px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,var(--clr-accent),var(--clr-gold));
  color:var(--clr-bg);
  cursor:pointer;
  transition:all var(--duration);
  box-shadow:0 10px 40px rgba(0,255,247,0.3);
}

#enterButton:disabled{
  opacity:0.3;
  cursor:not-allowed;
  background:#333;
  box-shadow:none;
}

#enterButton:not(:disabled):hover{
  transform:translateY(-3px);
  box-shadow:0 20px 60px rgba(0,255,247,0.5);
}

#appContainer{
  display:none;
  min-height:100vh;
  padding-bottom:4rem;
}

.navbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:80px;
  background:rgba(8,8,12,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,255,247,0.1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 3rem;
  z-index:1000;
}

.nav-brand{
  display:flex;
  align-items:center;
  gap:1rem;
}

.nav-logo{
  width:45px;
  height:45px;
  background:linear-gradient(135deg,var(--clr-accent),var(--clr-gold));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:28px;
  font-weight:900;
  color:var(--clr-bg);
  box-shadow:0 0 20px rgba(0,255,247,0.3);
}

.nav-title{
  font-family:var(--font-display);
  font-size:1.4rem;
  font-weight:700;
  background:linear-gradient(90deg,var(--clr-accent),var(--clr-gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.back-button{
  padding:0.8rem 1.5rem;
  border:1px solid var(--clr-accent);
  background:transparent;
  color:var(--clr-accent);
  border-radius:25px;
  cursor:pointer;
  font-family:var(--font-body);
  font-weight:600;
  transition:all var(--duration);
  display:flex;
  align-items:center;
  gap:0.5rem;
}

.back-button:hover{
  background:var(--clr-accent);
  color:var(--clr-bg);
  transform:translateX(-3px);
}

.main-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:2rem;
  max-width:1400px;
  margin:100px auto 0;
  padding:2rem;
}

.menu-card{
  background:linear-gradient(145deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));
  border:1px solid rgba(0,255,247,0.1);
  border-radius:var(--radius);
  overflow:hidden;
  transition:all var(--duration);
  cursor:pointer;
  position:relative;
  backdrop-filter:blur(10px);
}

.menu-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent,rgba(0,255,247,0.05),transparent);
  opacity:0;
  transition:opacity var(--duration);
}

.menu-card:hover{
  transform:translateY(-10px);
  border-color:rgba(0,255,247,0.3);
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(0,255,247,0.1);
}

.menu-card:hover::before{
  opacity:1;
}

.card-image{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:transform var(--duration);
  border-bottom:1px solid rgba(0,255,247,0.1);
  display:block;
}

.menu-card:hover .card-image{
  transform:scale(1.1);
}

.card-content{
  padding:1.5rem;
}

.card-header{
  display:flex;
  align-items:center;
  gap:1rem;
  margin-bottom:1rem;
}

.card-icon{
  width:45px;
  height:45px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,255,247,0.1);
  border:1px solid rgba(0,255,247,0.2);
  flex-shrink:0;
}

.card-icon svg{
  width:24px;
  height:24px;
  fill:var(--clr-accent);
}

.card-title{
  font-family:var(--font-display);
  font-size:1.3rem;
  color:var(--clr-accent);
  font-weight:700;
}

.card-quote{
  font-family:var(--font-quote);
  font-style:italic;
  color:rgba(255,255,255,0.6);
  font-size:0.95rem;
  line-height:1.5;
  border-left:2px solid var(--clr-gold);
  padding-left:1rem;
  margin-top:0.5rem;
  min-height:60px;
}

.detail-section{
  display:none;
  max-width:900px;
  margin:100px auto 0;
  padding:2rem;
  animation:fadeIn 0.6s ease;
}

.detail-section.active{
  display:block;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

.detail-card{
  background:linear-gradient(145deg,var(--clr-bg-card),rgba(255,255,255,0.02));
  border:1px solid rgba(0,255,247,0.15);
  border-radius:var(--radius);
  padding:3rem;
  text-align:center;
  backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

.detail-icon{
  width:80px;
  height:80px;
  margin:0 auto 1.5rem;
  background:linear-gradient(135deg,rgba(0,255,247,0.1),rgba(255,215,0,0.1));
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(0,255,247,0.2);
}

.detail-icon svg{
  width:40px;
  height:40px;
  fill:var(--clr-accent);
}

.detail-title{
  font-family:var(--font-display);
  font-size:2.5rem;
  background:linear-gradient(90deg,var(--clr-accent),var(--clr-gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:0.5rem;
}

.detail-link{
  display:inline-block;
  padding:1rem 3rem;
  background:linear-gradient(135deg,var(--clr-accent),var(--clr-gold));
  color:var(--clr-bg);
  text-decoration:none;
  border-radius:50px;
  font-weight:700;
  font-size:1.2rem;
  margin:1.5rem 0;
  transition:all var(--duration);
  box-shadow:0 10px 40px rgba(0,255,247,0.3);
}

.detail-link:hover{
  transform:scale(1.05);
  box-shadow:0 15px 50px rgba(0,255,247,0.5);
}

.detail-image{
  width:100%;
  max-width:400px;
  border-radius:var(--radius);
  margin:2rem 0;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  border:2px solid rgba(0,255,247,0.2);
  display:block;
  margin-left:auto;
  margin-right:auto;
}

.detail-quote{
  font-family:var(--font-quote);
  font-size:1.4rem;
  color:var(--clr-gold);
  font-style:italic;
  margin-top:2rem;
  padding:1.5rem;
  border-top:1px solid rgba(255,215,0,0.2);
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.author{
  display:block;
  margin-top:1rem;
  font-size:0.9rem;
  color:rgba(255,255,255,0.5);
  font-style:normal;
  font-family:var(--font-body);
}

.qr-container{
  margin-top:2rem;
  padding:1.5rem;
  background:white;
  border-radius:var(--radius);
  display:inline-block;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.qr-placeholder{
  width:150px;
  height:150px;
  background:linear-gradient(135deg,#f0f0f0,#e0e0e0);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#666;
  font-size:0.8rem;
  text-align:center;
  padding:1rem;
}

@media(max-width:768px){
  .navbar{padding:0 1.5rem}
  .main-grid{grid-template-columns:1fr;padding:1rem;margin-top:90px;gap:1.5rem}
  .detail-card{padding:2rem 1.5rem}
  .detail-title{font-size:1.8rem}
  .menu-card{min-width:auto}
  .card-image{height:180px}
  #animatedTitle{font-size:1.8rem;letter-spacing:2px}
  .logo-big{width:100px;height:100px;font-size:60px}
}
</style>
</head>

<script>
const quotesDB = {
  instagram: [
    {text: "La vie est un mystère qu'il faut vivre, et non un problème à résoudre.", author: "Gandhi"},
    {text: "On ne voit bien qu'avec le cœur. L'essentiel est invisible pour les yeux.", author: "Saint-Exupéry"},
    {text: "La beauté commence au moment où vous décidez d'être vous-même.", author: "Coco Chanel"}
  ],
  youtube: [
    {text: "Le succès n'est pas final, l'échec n'est pas fatal : c'est le courage de continuer qui compte.", author: "Churchill"},
    {text: "La musique exprime ce qui ne peut être dit.", author: "Victor Hugo"},
    {text: "La vie sans musique serait une erreur.", author: "Nietzsche"}
  ],
  x: [
    {text: "Ne remets pas au lendemain ce que tu peux faire le jour même.", author: "Benjamin Franklin"},
    {text: "Le monde appartient à ceux qui se lèvent tôt.", author: "Proverbe"},
    {text: "La liberté n'a pas de prix.", author: "Bob Marley"}
  ],
  facebook: [
    {text: "L'amitié est un âme en deux corps.", author: "Aristote"},
    {text: "La famille est le premier cadeau que la vie nous offre.", author: "Inconnu"},
    {text: "Un ami est une âme qui réside dans deux corps.", author: "Aristote"}
  ],
  tiktok: [
    {text: "La danse est la poésie du mouvement.", author: "Inconnu"},
    {text: "La créativité, c'est l'intelligence qui s'amuse.", author: "Einstein"},
    {text: "La vie est une fête, habille-toi pour ça.", author: "Audrey Hepburn"}
  ],
  contact: [
    {text: "On sait bien quand on part, mais jamais quand on revient.", author: "Proverbe africain"},
    {text: "Un seul être vous manque et tout est dépeuplé.", author: "Lamartine"},
    {text: "La patience est l'art d'espérer.", author: "Vauvenargues"}
  ]
};

const translations = {
  fr: {enter: "Entrer", back: "Retour"},
  ln: {enter: "Kota", back: "Banda"}
};

function getRandomQuote(category) {
  const quotes = quotesDB[category] || quotesDB.contact;
  return quotes[Math.floor(Math.random() * quotes.length)];
}

function injectQuotes() {
  document.querySelectorAll('[data-quotes]').forEach(el => {
    const category = el.getAttribute('data-quotes');
    const quote = getRandomQuote(category);
    el.textContent = `"${quote.text}" — ${quote.author}`;
  });

  Object.keys(quotesDB).forEach(key => {
    const el = document.getElementById(`quote-${key}`);
    if (el) {
      const quote = getRandomQuote(key);
      el.innerHTML = `"${quote.text}"<span class="author">— ${quote.author}</span>`;
    }
  });
}

function createParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(p);
  }
}

const langSel = document.getElementById('languageSelect');
const enterBtn = document.getElementById('enterButton');
const introScreen = document.getElementById('introScreen');
const app = document.getElementById('appContainer');
const backBtn = document.getElementById('backButton');
const mainGrid = document.getElementById('mainGrid');

langSel.addEventListener('change', () => {
  const lang = langSel.value;
  enterBtn.disabled = !lang;
  if (lang && translations[lang]) {
    enterBtn.textContent = translations[lang].enter;
  }
});

enterBtn.addEventListener('click', () => {
  const lang = langSel.value;
  if (!lang) return;
  
  localStorage.setItem('lang', lang);
  localStorage.setItem('visited', 'true');
  
  introScreen.style.opacity = '0';
  setTimeout(() => {
    introScreen.style.display = 'none';
    app.style.display = 'block';
    createParticles();
    injectQuotes();
  }, 500);
});

function checkVisited() {
  if (localStorage.getItem('visited') === 'true') {
    introScreen.style.display = 'none';
    app.style.display = 'block';
    createParticles();
    injectQuotes();
  } else {
    createParticles();
  }
}

document.querySelectorAll('.menu-card').forEach(card => {
  card.addEventListener('click', () => {
    const menu = card.getAttribute('data-menu');
    
    document.querySelectorAll('.detail-section').forEach(s => {
      s.classList.remove('active');
    });
    
    const targetSection = document.getElementById(`detail-${menu}`);
    if (targetSection) {
      targetSection.classList.add('active');
    }
    
    mainGrid.style.display = 'none';
    backBtn.style.display = 'flex';
    
    const lang = localStorage.getItem('lang') || 'fr';
    if (translations[lang]) {
      backBtn.textContent = translations[lang].back;
    }
    
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
});

backBtn.addEventListener('click', () => {
  document.querySelectorAll('.detail-section').forEach(s => s.classList.remove('active'));
  mainGrid.style.display = 'grid';
  backBtn.style.display = 'none';
  injectQuotes();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && backBtn.style.display !== 'none') {
    backBtn.click();
  }
});

document.addEventListener('DOMContentLoaded', checkVisited);
</script>
