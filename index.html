<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Starr Morgan | Official</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0f'/%3E%3Ctext x='50' y='70' font-family='Arial' font-size='60' font-weight='900' text-anchor='middle' fill='%23ffd700'%3EM%3C/text%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --clr-bg: #050508;
            --clr-bg-card: #0d0d14;
            --clr-accent: #00f2ff; /* Cyan Electrique */
            --clr-gold: #ffcc00;   /* Or Pur */
            --clr-rose: #ff0055;
            --clr-text: #f0f0f0;
            --radius: 20px;
            --duration: 0.4s;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-quote: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--clr-bg);
            color: var(--clr-text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Arrière-plan animé */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 204, 0, 0.05) 0%, transparent 40%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--clr-gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; transform: scale(1.5); }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        /* Écran d'accueil */
        #introScreen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            z-index: 9999;
            background: var(--clr-bg);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-big {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--clr-gold), var(--clr-accent));
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 80px;
            font-weight: 900;
            color: #000;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.3);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 30px rgba(255, 204, 0, 0.2); }
            to { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 242, 255, 0.4); }
        }

        #animatedTitle {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #fff, var(--clr-gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .language-selector {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        select {
            padding: 1rem 2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.3);
            color: var(--clr-gold);
            font-family: var(--font-body);
            cursor: pointer;
            outline: none;
            min-width: 220px;
            text-align: center;
        }

        #enterButton {
            padding: 1rem 4rem;
            border-radius: 50px;
            border: none;
            background: var(--clr-gold);
            color: #000;
            font-family: var(--font-display);
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }

        #enterButton.ready {
            opacity: 1;
            pointer-events: all;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.4);
        }

        /* Interface Principale */
        #appContainer {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 80px;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-logo {
            width: 40px; height: 40px;
            background: var(--clr-gold);
            color: #000;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 900;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--clr-gold);
            color: var(--clr-gold);
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            font-weight: 600;
        }

        /* Grille & Cartes */
        .main-grid {
            max-width: 1200px;
            margin: 120px auto 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background: var(--clr-bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--clr-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .card-img {
            width: 100%; height: 200px; object-fit: cover;
            filter: grayscale(0.5); transition: 0.5s;
        }

        .card:hover .card-img { filter: grayscale(0); transform: scale(1.05); }

        .card-body { padding: 20px; }
        .card-title { font-family: var(--font-display); color: var(--clr-gold); margin-bottom: 10px; }
        .card-text { font-family: var(--font-quote); font-style: italic; opacity: 0.7; font-size: 0.9rem; }

        /* Sections Détails */
        .detail-view {
            display: none;
            max-width: 800px;
            margin: 120px auto;
            padding: 20px;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-img {
            width: 250px; height: 250px;
            border-radius: 50%;
            border: 4px solid var(--clr-gold);
            margin: 0 auto 20px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }

        .btn-link {
            display: block;
            width: fit-content;
            margin: 20px auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--clr-gold), #ffaa00);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            font-family: var(--font-display);
        }

        .quote-box {
            margin-top: 30px;
            padding: 20px;
            border-left: 3px solid var(--clr-gold);
            background: rgba(255, 255, 255, 0.02);
            font-family: var(--font-quote);
            font-size: 1.2rem;
            color: #fff;
        }

        @media (max-width: 600px) {
            .navbar { padding: 0 20px; }
            .logo-big { width: 100px; height: 100px; font-size: 60px; }
            .profile-img { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="particles" id="particleContainer"></div>

    <!-- Écran de Bienvenue -->
    <section id="introScreen">
        <div class="logo-big">M</div>
        <h1 id="animatedTitle">Morning Starr Morgan</h1>
        <div class="language-selector">
            <select id="langSelect">
                <option value="" disabled selected>Select Language / Langue</option>
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="ln">Lingala</option>
            </select>
            <button id="enterButton">COMMENCER</button>
        </div>
    </section>

    <!-- Contenu Principal -->
    <div id="appContainer">
        <nav class="navbar">
            <div class="nav-brand">
                <div class="nav-logo">M</div>
                <span style="font-family: var(--font-display); font-weight: 700; color: var(--clr-gold);">MORNING STARR</span>
            </div>
            <button class="back-btn" id="backBtn">RETOUR</button>
        </nav>

        <main class="main-grid" id="mainGrid">
            <!-- Les cartes seront générées ici -->
        </main>

        <!-- Vue Détails -->
        <section class="detail-view" id="detailView">
            <div class="profile-header">
                <img src="eb6c74c3-7f46-4c93-8241-ce41d6c58c2a.jpg" alt="Morning Starr" class="profile-img">
                <h2 id="detailTitle" style="font-family: var(--font-display); font-size: 2.5rem; color: var(--clr-gold);"></h2>
                <a href="#" id="detailLink" target="_blank" class="btn-link">VISITER</a>
                <div class="quote-box" id="detailQuote"></div>
            </div>
        </section>
    </div>

    <script>
        const config = {
            fr: { enter: "ENTRER", back: "RETOUR", select: "Choisir la langue" },
            en: { enter: "ENTER", back: "BACK", select: "Select Language" },
            ln: { enter: "KOTA", back: "ZONGA", select: "Pona Monoko" }
        };

        const socialData = [
            { id: 'instagram', title: 'Instagram', url: 'https://instagram.com/kama.ko69', img: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=500', quote: "La beauté commence au moment où vous décidez d'être vous-même." },
            { id: 'youtube', title: 'YouTube', url: 'https://youtube.com/@JohnnyMorgan-rs7xe', img: 'https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?w=500', quote: "La musique exprime ce qui ne peut être dit et sur quoi il est impossible de se taire." },
            { id: 'tiktok', title: 'TikTok', url: 'https://tiktok.com/@morningstarr', img: 'https://images.unsplash.com/photo-1611162616475-46b635cb6868?w=500', quote: "La créativité, c'est l'intelligence qui s'amuse." },
            { id: 'facebook', title: 'Facebook', url: 'https://facebook.com/morgan.mornigstarr', img: 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500', quote: "L'amitié est une âme en deux corps." },
            { id: 'contact', title: 'Contact', url: 'mailto:kkamako69@gmail.com', img: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500', quote: "Écrivez l'histoire que vous voulez lire." }
        ];

        // --- Moteur de l'Application ---

        const langSelect = document.getElementById('langSelect');
        const enterBtn = document.getElementById('enterButton');
        const intro = document.getElementById('introScreen');
        const app = document.getElementById('appContainer');
        const grid = document.getElementById('mainGrid');
        const backBtn = document.getElementById('backBtn');
        const detailView = document.getElementById('detailView');

        // Gestion de la langue et du bouton Entrer
        langSelect.addEventListener('change', () => {
            const lang = langSelect.value;
            enterBtn.textContent = config[lang].enter;
            enterBtn.classList.add('ready');
        });

        enterBtn.addEventListener('click', () => {
            const lang = langSelect.value;
            localStorage.setItem('ms_lang', lang);
            localStorage.setItem('ms_visited', 'true');
            showApp();
        });

        function showApp() {
            const lang = localStorage.getItem('ms_lang') || 'fr';
            backBtn.textContent = config[lang].back;
            
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                app.style.display = 'block';
                setTimeout(() => app.style.opacity = '1', 50);
                renderGrid();
            }, 800);
        }

        function renderGrid() {
            grid.innerHTML = '';
            socialData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.img}" class="card-img" alt="${item.title}">
                    <div class="card-body">
                        <h3 class="card-title">${item.title}</h3>
                        <p class="card-text">"${item.quote.substring(0, 40)}..."</p>
                    </div>
                `;
                card.onclick = () => showDetail(item);
                grid.appendChild(card);
            });
        }

        function showDetail(item) {
            grid.style.display = 'none';
            detailView.style.display = 'block';
            backBtn.style.display = 'block';

            document.getElementById('detailTitle').textContent = item.title;
            document.getElementById('detailQuote').textContent = `"${item.quote}"`;
            document.getElementById('detailLink').href = item.url;
            
            window.scrollTo(0, 0);
        }

        backBtn.onclick = () => {
            grid.style.display = 'grid';
            detailView.style.display = 'none';
            backBtn.style.display = 'none';
        };

        // Particules
        function initParticles() {
            const container = document.getElementById('particleContainer');
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }

        // Vérification automatique au chargement
        window.onload = () => {
            initParticles();
            if(localStorage.getItem('ms_visited') === 'true') {
                // On passe directement à l'app si déjà visité
                showApp();
            }
        };
    </script>
</body>
</html>
