<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Starr Morgan | Official Pro</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2300fff7'/%3E%3Cstop offset='100%25' style='stop-color:%23ffd700'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0f'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='900' text-anchor='middle' fill='url(%23g)'%3EM%3C/text%3E%3Ccircle cx='85' cy='15' r='8' fill='%23ff2a6d'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --clr-bg: #020204;
            --clr-bg-card: #08080c;
            --clr-accent: #00f2ff;
            --clr-gold: #ffcc00;
            --clr-rose: #ff0055;
            --clr-text: #e0e0e0;
            --radius: 12px;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-quote: 'Playfair Display', serif;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ANIMATIONS SYSTÈME --- */
        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(1000%); opacity: 0; }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            100% { box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        }

        @keyframes text-reveal {
            from { letter-spacing: 20px; filter: blur(10px); opacity: 0; }
            to { letter-spacing: 6px; filter: blur(0); opacity: 1; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--clr-bg);
            color: var(--clr-text);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Grille futuriste animée */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* --- INTRO SCREEN --- */
        #introScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a14 0%, var(--clr-bg) 100%);
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }

        .logo-big {
            font-family: var(--font-display);
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--clr-gold), var(--clr-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.3));
            animation: pulse-glow 2s infinite alternate;
        }

        #animatedTitle {
            font-family: var(--font-display);
            font-size: clamp(1rem, 4vw, 2.5rem);
            margin-top: 20px;
            text-transform: uppercase;
            animation: text-reveal 1.5s var(--transition);
            color: white;
            opacity: 0.8;
        }

        /* --- INTERFACE PRINCIPALE --- */
        #appContainer {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s var(--transition);
        }

        .navbar {
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(2,2,4,0.8);
        }

        .section-title {
            font-family: var(--font-display);
            text-align: center;
            padding: 80px 20px 40px;
            color: var(--clr-gold);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 1.2rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: var(--clr-accent);
            margin: 15px auto;
        }

        /* --- CARTES CITATIONS --- */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px 5% 60px;
        }

        .card {
            background: var(--clr-bg-card);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: var(--radius);
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: 0.4s var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 10%;
            background: linear-gradient(to bottom, transparent, var(--clr-accent), transparent);
            opacity: 0;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--clr-accent);
            background: #0c0c14;
        }

        .card:hover::before {
            animation: scanline 1.5s linear infinite;
            opacity: 0.3;
        }

        .quote-text {
            font-family: var(--font-quote);
            font-size: 1.25rem;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.4;
            position: relative;
            z-index: 2;
        }

        .quote-author {
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--clr-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: auto;
        }

        /* Boutons */
        .btn-futur {
            background: transparent;
            border: 1px solid var(--clr-gold);
            color: var(--clr-gold);
            padding: 12px 30px;
            font-family: var(--font-display);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .btn-futur:hover {
            background: var(--clr-gold);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        select {
            background: #111;
            color: white;
            border: 1px solid #333;
            padding: 10px 20px;
            font-family: var(--font-body);
            border-radius: 4px;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <section id="introScreen">
        <div class="logo-big">M</div>
        <h1 id="animatedTitle">Morning Starr Morgan</h1>
        <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
            <select id="langSelect">
                <option value="fr">INTERFACE : FRANÇAIS</option>
                <option value="en">INTERFACE : ENGLISH</option>
            </select>
            <button id="enterButton" class="btn-futur">INITIALISER LE SYSTÈME</button>
        </div>
    </section>

    <div id="appContainer">
        <nav class="navbar">
            <div style="font-family: var(--font-display); font-weight: 900; color: #fff;">
                MS <span style="color: var(--clr-gold);">STARR</span>
            </div>
            <button class="btn-futur" onclick="location.reload()">REBOOT</button>
        </nav>

        <section id="philosophy">
            <h2 class="section-title">Noyau Philosophique</h2>
            <main class="main-grid" id="quoteGrid"></main>
        </section>

        <section id="proverbs">
            <h2 class="section-title">Proverbes Ancestraux</h2>
            <main class="main-grid" id="proverbGrid"></main>
        </section>

        <footer style="text-align: center; padding: 40px; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.4;">
            © 2026 MORNING STARR MORGAN | TOUS DROITS RÉSERVÉS
        </footer>
    </div>

    <script>
        // --- BASE DE DONNÉES ---
        const philosophy = [
            { q: "L'homme est condamné à être libre.", a: "Jean-Paul Sartre" },
            { q: "Ce qui ne me tue pas me rend plus fort.", a: "Friedrich Nietzsche" },
            { q: "Le bonheur est une direction, pas une destination.", a: "Sénèque" },
            { q: "On n'est pas ce que l'on est, on est ce que l'on fait.", a: "Aristote" },
            { q: "La vie est un mystère qu'il faut vivre, et non un problème à résoudre.", a: "Gandhi" },
            { q: "Le cœur a ses raisons que la raison ne connaît point.", a: "Blaise Pascal" },
            { q: "Connais-toi toi-même.", a: "Socrate" },
            { q: "Rien ne se perd, rien ne se crée, tout se transforme.", a: "Lavoisier" }
        ];

        const proverbs = [
            { q: "Le silence est le plus haut cri de la sagesse.", a: "Proverbe Africain" },
            { q: "L'eau ne reste pas sur les montagnes, ni la vengeance dans un grand cœur.", a: "Proverbe Chinois" },
            { q: "Qui donne ne doit jamais s'en souvenir, qui reçoit ne doit jamais l'oublier.", a: "Proverbe Arabe" },
            { q: "Un livre est comme un jardin transporté dans la poche.", a: "Proverbe Arabe" },
            { q: "Le bois a beau rester dans l'eau, il ne deviendra jamais un crocodile.", a: "Proverbe Wolof" },
            { q: "C'est au bout de la vieille corde qu'on tisse la nouvelle.", a: "Proverbe Béninois" }
        ];

        // --- LOGIQUE D'INTERACTION ---
        const enterBtn = document.getElementById('enterButton');
        const intro = document.getElementById('introScreen');
        const app = document.getElementById('appContainer');

        enterBtn.onclick = () => {
            // Animation de sortie
            intro.style.opacity = '0';
            intro.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                intro.style.display = 'none';
                app.style.display = 'block';
                // Petit délai pour l'animation d'entrée du container
                setTimeout(() => {
                    app.style.opacity = '1';
                    app.style.transform = 'translateY(0)';
                    renderContent();
                }, 50);
            }, 800);
        };

        function renderContent() {
            const qGrid = document.getElementById('quoteGrid');
            const pGrid = document.getElementById('proverbGrid');

            // Nettoyage avant injection
            qGrid.innerHTML = '';
            pGrid.innerHTML = '';

            philosophy.forEach((item, index) => {
                const card = createCard(item.q, item.a);
                card.style.transitionDelay = `${index * 0.1}s`;
                qGrid.appendChild(card);
            });

            proverbs.forEach((item, index) => {
                const card = createCard(item.q, item.a);
                card.style.transitionDelay = `${index * 0.1}s`;
                pGrid.appendChild(card);
            });
        }

        function createCard(quote, author) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <p class="quote-text">"${quote}"</p>
                <p class="quote-author">/ ${author}</p>
            `;
            return div;
        }
    </script>
</body>
</html>
